name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  build-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift
        run: swift --version
      - name: Build
        run: swift build -v
      - name: Test (includes the 100% safety gate)
        run: swift test -v
