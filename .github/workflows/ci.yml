name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select a Swift 6 toolchain (Xcode 16)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Show Swift
        run: swift --version
      - name: Build
        run: swift build -v
      - name: Test (includes the 100% safety gate)
        run: swift test -v
      - name: Integration smoke test
        run: ./Scripts/integration-smoke.sh
